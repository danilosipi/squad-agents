# PostgreSQL apenas para testes integrados locais (FASE 17.1).
# Não usar em produção. Subir: docker compose -f docker-compose.integration.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: cap-base-integration-postgres
    environment:
      POSTGRES_USER: cap_base_test
      POSTGRES_PASSWORD: cap_base_test
      POSTGRES_DB: cap_base_test
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cap_base_test -d cap_base_test"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s
